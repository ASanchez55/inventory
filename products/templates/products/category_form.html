{% extends "base.html" %}

{% block title %}{{ page_title }}{% endblock %}

{% block content %}
<section style="max-width:32rem;">
    <h2>{{ page_title }}</h2>

    <form method="post">
        {% csrf_token %}

        {% if form.non_field_errors %}
        <div>
            {{ form.non_field_errors }}
        </div>
        {% endif %}

        <div style="margin-bottom:1rem;">
            <label for="{{ form.name.id_for_label }}">Category Name</label>
            {{ form.name }}
            {% if form.name.errors %}
            <div>
                {{ form.name.errors }}
            </div>
            {% endif %}
        </div>

        <button type="submit">{{ button_label }}</button>
        <a href="{% url 'products:category_list' %}" style="margin-left:1rem;">Cancel</a>
    </form>
</section>
{% endblock %}
