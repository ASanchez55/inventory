{% extends "base.html" %}

{% block title %}Delete Product{% endblock %}

{% block content %}
<section style="max-width:32rem;">
    <h2>Delete Product</h2>
    <p>Are you sure you want to delete <strong>{{ product.name }}</strong>?</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit">Yes, Delete</button>
        <a href="{% url 'products:product_list' %}" style="margin-left:1rem;">Cancel</a>
    </form>
</section>
{% endblock %}
